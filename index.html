    <p>This preview is just 3 days. The full VA Blueprint gives you 30 days of step-by-step action, AI-powered script generators, a built-in client pipeline tracker, and daily journal prompts.</p>
    <div class="price-row"><span class="price-old">$27</span><span class="price-new">$14</span></div>
    <div class="price-note">Preview-only discount. Use code at checkout.</div>
    <a href="https://buy.stripe.com/6oU3cxeav7xyaft8iE63K05" class="btn btn-primary">Get the Full Blueprint</a>
    <div class="code-hint">Use code <code>PREVIEW30</code> at checkout</div>
  </div>
  <div class="footer-note">Owned and operated by <a href="https://messickmarketing.com/" target="_blank">Messick Marketing</a></div>
  </div>`;

}

function showDay(index) {
  const state = getAccessState();
  if (state !== 'active') { routeUser(); return; }
  currentDay = index;
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('dayScreen').style.display = '';
  renderDay(index);
  window.scrollTo(0,0);
}

function renderDay(index) {
  const d = DAYS[index];
  const savedTasks = JSON.parse(localStorage.getItem(`va_preview_day${index}_tasks`) || '[]');
  const savedJournal = localStorage.getItem(`va_preview_day${index}_journal`) || '';
  const doneCount = savedTasks.filter(Boolean).length;
  const total = d.tasks.length;
  const progressPct = ((index+1)/3)*100;
  const heroTitle = d.titleEm ? d.title.replace(d.titleEm, '<em>'+d.titleEm+'</em>') : d.title;
  const isFirst = index === 0, isLast = index === 2;
  const timeDisplay = ['All day','Ongoing','However long it takes'].includes(d.time) ? d.time : d.time+' min';
  const tasksHtml = d.tasks.map((t,i) => `<li class="task-item ${savedTasks[i]?'done':''}" onclick="toggleTask(this,${index},${i})">
    <div class="task-check"><svg viewBox='0 0 13 10' fill='none' xmlns='http://www.w3.org/2000/svg'><path d='M1.5 5L5 8.5L11.5 1.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg></div>
    <div class="task-text">${t.text} <span class="task-tag">${t.tag}</span></div>
  </li>`).join('');
  const aiHtml = d.aiGenerator ? renderAIGenerator(d.aiGenerator, index) : '';
  document.getElementById('dayScreen').innerHTML = `
  ${renderCountdown()}
  <div style="animation:fadeDown 0.4s ease both;"><button class="btn btn-ghost" onclick="showHome()" style="margin-bottom:28px;font-size:0.82rem;">\u2190 All Days</button></div>
  <div class="progress-bar-wrap"><div class="progress-bar-label"><span>Preview Progress</span><span>Day ${index+1} of 3</span></div><div class="progress-bar-track"><div class="progress-bar-fill" style="width:${progressPct}%"></div></div></div>
  <div class="hero"><div class="day-label">Day ${index+10} of 30</div><h1>${heroTitle}</h1><p>${d.focus}</p></div>
  <div class="pro-tip-banner"><div class="pro-tip-icon">\u{1F4A1}</div><div><strong>Pro tip</strong><p>${d.proTip}</p></div></div>
  <div class="card-grid">
    <div class="card"><div class="card-number">${d.time}</div><h3>Time Required</h3><p>${timeDisplay} of focused work. Progress over perfection.</p></div>
    <div class="card"><div class="card-number">1</div><h3>Big Win Today</h3><p>${d.win}</p></div>
  </div>
  <div class="action-section"><div class="section-eyebrow">Today\u2019s Tasks</div><h2>Do These ${total} Things</h2><ul class="task-list" id="taskList">${tasksHtml}</ul></div>
  ${aiHtml}
  <div class="journal-section"><div class="section-eyebrow">Reflection</div><h2>Your Daily Journal</h2><p class="subtitle">Takes 2 minutes. Skipping this is skipping results.</p><div class="journal-prompt">${d.prompt}</div><textarea id="journalEntry" placeholder="Write your answer here. No judgment, no editing \u2014 just think out loud..." oninput="saveJournal(${index})">${savedJournal}</textarea></div>
  <div class="affirmation"><div class="affirmation-icon">\u2728</div><p>${d.affirmation}</p></div>
  <div class="nav-buttons">
    <button class="btn btn-ghost" onclick="${isFirst?'showHome()':`showDay(${index-1})`}">\u2190 ${isFirst?'Home':`Day ${index+9}`}</button>
    <span class="day-counter" id="taskCounter">${doneCount} / ${total} tasks done</span>
    <button class="btn btn-primary" onclick="${isLast?'showHome()':`showDay(${index+1})`}">${isLast?'See Results \u2192':`Day ${index+11} \u2192`}</button>
  </div>
  <p class="save-notice">Your notes auto-save in this browser. <a onclick="downloadNotes(${index})">Download Day ${index+10} notes</a></p>
  <div class="footer-note">Owned and operated by <a href="https://messickmarketing.com/" target="_blank">Messick Marketing</a></div>`;
}

/* =============================================
   AI GENERATOR
   ============================================= */
function renderAIGenerator(gen, dayIndex) {
  const rem = AI_MAX - aiGenerations;
  const dots = Array.from({length:5},(_,i) => `<div class="ai-ldot ${i < rem?'':'empty'}"></div>`).join('');
  let fieldsHtml = '';
  const rowable = gen.fields.filter(f => f.type !== 'textarea');
  const textareas = gen.fields.filter(f => f.type === 'textarea');
  let i = 0;
  while (i < rowable.length) {
    if (i+1 < rowable.length) { fieldsHtml += `<div class="ai-row">${renderField(rowable[i],dayIndex)}${renderField(rowable[i+1],dayIndex)}</div>`; i+=2; }
    else { fieldsHtml += renderField(rowable[i],dayIndex); i++; }
  }
  textareas.forEach(f => { fieldsHtml += renderField(f,dayIndex); });
  return `<div class="ai-generator">
    <div class="ai-gen-header"><div class="ai-badge"><div class="ai-pulse"></div> AI powered</div></div>
    <div class="ai-gen-title">${gen.title}</div>
    <div class="ai-gen-subtitle">${gen.subtitle}</div>
    ${fieldsHtml}
    <button class="ai-gen-btn" id="aiBtn${dayIndex}" onclick="aiGenerate(${dayIndex})">Generate \u2192</button>
    <div id="aiResult${dayIndex}" style="display:none;">
      <div class="ai-result">
        <div class="ai-result-label">Your personalised script</div>
        <div class="ai-script" id="aiScript${dayIndex}"></div>
        <div class="ai-meta" id="aiMeta${dayIndex}"></div>
        <div class="ai-actions">
          <button class="ai-action-btn" id="aiCopy${dayIndex}" onclick="aiCopy(${dayIndex})">Copy</button>
          <button class="ai-action-btn" onclick="aiGenerate(${dayIndex})">Regenerate</button>
          <button class="ai-action-btn" onclick="aiShorter(${dayIndex})">Make shorter</button>
        </div>
      </div>
      <div class="ai-variants-label">2 more variations</div>
      <div class="ai-variants" id="aiVariants${dayIndex}"></div>
      <div class="ai-nudge" id="aiNudge${dayIndex}" style="display:none;"><div class="ai-nudge-icon">\u{1F4A1}</div><div><div class="ai-nudge-text">${gen.nudge.text}</div><div class="ai-nudge-sub">${gen.nudge.sub}</div></div></div>
    </div>
    <div class="ai-limit"><span class="ai-limit-text" id="aiLimitText${dayIndex}">${rem} generation${rem!==1?'s':''} remaining (preview)</span><div class="ai-limit-dots" id="aiLimitDots${dayIndex}">${dots}</div></div>
  </div>`;
}

function renderField(f, dayIndex) {
  const id = `ai_${dayIndex}_${f.id}`;
  if (f.type === 'select') return `<div class="ai-field"><label>${f.label}</label><select id="${id}" class="ai-input" style="cursor:pointer;">${f.options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
  if (f.type === 'textarea') return `<div class="ai-field"><label>${f.label}</label><textarea id="${id}" class="ai-textarea" placeholder="${f.placeholder||''}" rows="3"></textarea></div>`;
  return `<div class="ai-field"><label>${f.label}</label><input id="${id}" class="ai-input" placeholder="${f.placeholder||''}"></div>`;
}

function getFieldValues(gen, dayIndex) {
  const v = {};
  gen.fields.forEach(f => { const el = document.getElementById(`ai_${dayIndex}_${f.id}`); if (el) v[f.id] = el.value.trim(); });
  return v;
}

function updateAILimit(dayIndex) {
  const rem = AI_MAX - aiGenerations;
  const t = document.getElementById(`aiLimitText${dayIndex}`);
  const d = document.getElementById(`aiLimitDots${dayIndex}`);
  if (t) t.textContent = `${rem} generation${rem!==1?'s':''} remaining (preview)`;
  if (d) d.innerHTML = Array.from({length:5},(_,i) => `<div class="ai-ldot ${i < rem?'':'empty'}"></div>`).join('');
}

async function aiGenerate(dayIndex, customPrompt) {
  if (aiGenerations >= AI_MAX) return;
  const d = DAYS[dayIndex];
  const gen = d.aiGenerator;
  const values = getFieldValues(gen, dayIndex);
  if (!values[gen.fields[0].id]) { document.getElementById(`ai_${dayIndex}_${gen.fields[0].id}`).focus(); return; }
  const btn = document.getElementById(`aiBtn${dayIndex}`);
  btn.disabled = true; btn.textContent = 'Generating\u2026';
  const resultEl = document.getElementById(`aiResult${dayIndex}`);
  resultEl.style.display = 'block';
  const scriptEl = document.getElementById(`aiScript${dayIndex}`);
  scriptEl.innerHTML = '<span class="loading-dots"><span>\u2022</span><span>\u2022</span><span>\u2022</span></span>';
  document.getElementById(`aiMeta${dayIndex}`).textContent = '';
  document.getElementById(`aiVariants${dayIndex}`).innerHTML = '';
  document.getElementById(`aiNudge${dayIndex}`).style.display = 'none';
  const prompt = customPrompt || gen.buildPrompt(values);
  try {
    const response = await fetch(PROXY_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt, stream:true}) });
    if (!response.ok) throw new Error('error');
    scriptEl.textContent = '';
    let fullText = '';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value).split('\n')) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try { const p = JSON.parse(data); if (p.type==='content_block_delta'&&p.delta?.text) { fullText+=p.delta.text; scriptEl.textContent=fullText; } } catch(e) {}
        }
      }
    }
    const wc = fullText.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById(`aiMeta${dayIndex}`).innerHTML = `<span>${wc} words</span><span>reads in ~${Math.round(wc/238*60)}s</span>`;
    localStorage.setItem(`va_preview_ai_script_${dayIndex}`, fullText);
    aiGenerations++; localStorage.setItem('va_preview_ai_gens', aiGenerations);
    updateAILimit(dayIndex);
    aiGenerateVariants(gen, values, dayIndex);
    setTimeout(() => { document.getElementById(`aiNudge${dayIndex}`).style.display = 'flex'; }, 1000);
  } catch(e) {
    scriptEl.textContent = 'Could not connect. Please try again in a moment.';
  }
  btn.disabled = false; btn.textContent = 'Generate \u2192';
}

async function aiShorter(dayIndex) {
  const last = localStorage.getItem(`va_preview_ai_script_${dayIndex}`);
  if (!last) return;
  await aiGenerate(dayIndex, `Shorten this to under 50 words while keeping the key insight and soft question. Return ONLY the shortened text:\n\n${last}`);
}

async function aiGenerateVariants(gen, values, dayIndex) {
  const tones = ['Alternative angle','More concise'];
  const grid = document.getElementById(`aiVariants${dayIndex}`);
  grid.innerHTML = tones.map(t=>`<div class="ai-variant"><div class="ai-variant-tone">${t}</div><div class="ai-variant-preview loading-dots"><span>\u2022</span><span>\u2022</span><span>\u2022</span></div></div>`).join('');
  for (let i = 0; i < tones.length; i++) {
    try {
      const res = await fetch(PROXY_URL, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt: gen.buildPrompt({...values,tone:tones[i]}) + ' Return only the first sentence as a hook preview, nothing else.'})});
      const data = await res.json();
      const text = data.content || '';
      grid.children[i].querySelector('.ai-variant-preview').textContent = text + '\u2026';
      const fp = gen.buildPrompt({...values,tone:tones[i]});
      grid.children[i].onclick = () => aiGenerate(dayIndex, fp);
    } catch(e) { grid.children[i].querySelector('.ai-variant-preview').textContent = 'Could not load.'; }
  }
}

function aiCopy(dayIndex) {
  const text = document.getElementById(`aiScript${dayIndex}`).textContent;
  if (!text || text.includes('\u2022')) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`aiCopy${dayIndex}`);
    btn.textContent = 'Copied!'; btn.classList.add('ai-copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ai-copied'); }, 2000);
  });
}

/* =============================================
   TASKS / JOURNAL / DOWNLOAD
   ============================================= */
function toggleTask(item, dayIndex, taskIndex) {
  item.classList.toggle('done');
  const items = document.querySelectorAll('#taskList .task-item');
  const states = [...items].map(t => t.classList.contains('done'));
  localStorage.setItem(`va_preview_day${dayIndex}_tasks`, JSON.stringify(states));
  const doneCount = states.filter(Boolean).length;
  document.getElementById('taskCounter').textContent = `${doneCount} / ${states.length} tasks done`;
  if (doneCount === states.length) markDayComplete(dayIndex);
}

function saveJournal(dayIndex) { localStorage.setItem(`va_preview_day${dayIndex}_journal`, document.getElementById('journalEntry').value); }

function downloadNotes(dayIndex) {
  const d = DAYS[dayIndex];
  const tasks = [...document.querySelectorAll('#taskList .task-item')].map(t => `${t.classList.contains('done')?'[x]':'[ ]'} ${t.querySelector('.task-text').textContent.trim()}`).join('\n');
  const journal = document.getElementById('journalEntry').value || '(no notes written yet)';
  const content = `THE VA BLUEPRINT (PREVIEW) \u2014 Day ${dayIndex+10} Notes\n${'='.repeat(48)}\n\nDAY TITLE: ${d.title}\n\nTASKS:\n${tasks}\n\nJOURNAL PROMPT:\n${d.prompt}\n\nMY ANSWER:\n${journal}\n\nDate saved: ${new Date().toLocaleDateString()}\n\nGet the full 30-day blueprint at $14 with code PREVIEW30: https://buy.stripe.com/6oU3cxeav7xyaft8iE63K05`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:'text/plain'}));
  a.download = `VA-Blueprint-Day${dayIndex+10}-Notes.txt`;
  a.click();
}

/* Auto-check expiry every 60s */
setInterval(() => {
  if (getAccessState() === 'expired' && (document.getElementById('homeScreen').style.display !== 'none' || document.getElementById('dayScreen').style.display !== 'none')) {
    routeUser();
  }
}, 60000);

/* URL param unlock (from MailerLite redirect back) */
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.has('unlocked') || urlParams.has('ml_success')) {
  if (getAccessState() === 'gate') grantAccess();
}

/* INIT */
routeUser();
</script>
